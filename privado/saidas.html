<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compras - Gestão TBA-FR</title>
  <link rel="stylesheet" href="../public/styles/main.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <a href="home.html" class="logo">
          <div class="logo-icon">🏠</div>
          <span>Gestão TBA-FR</span>
        </a>
        <nav class="nav-menu">
          <a href="home.html" class="nav-link">
            <span>🏠</span>
            <span>Home</span>
          </a>
          <a href="saidas.html" class="nav-link active">
            <span>🛒</span>
            <span>Compras</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div class="section-header">
        <h1 class="section-title">
          🛒 Gestão de Compras
        </h1>
      </div>

      <div class="card mb-6">
        <div class="card-header">
          <h2 class="card-title">Nova Compra</h2>
          <p class="card-subtitle">Registar uma nova compra a fornecedores</p>
        </div>
        <div class="card-content">
          <form id="formSaida">
            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label" for="produto">Produto</label>
                <input type="text" id="produto" class="form-input" placeholder="Nome do produto" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="fornecedor">Fornecedor</label>
                <input type="text" id="fornecedor" class="form-input" placeholder="Nome do fornecedor" required />
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label" for="valor">Valor (€)</label>
                <input type="number" id="valor" class="form-input" placeholder="0.00" step="0.01" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="data">Data</label>
                <input type="date" id="data" class="form-input" required />
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
              Registar Compra
            </button>
          </form>
        </div>
      </div>

      <div class="card mb-6">
        <div class="card-content">
          <div class="filter-bar">
            <input type="text" id="filtroProduto" class="form-input" placeholder="Filtrar por produto">
            <select id="filtroMes" class="form-select">
              <option value="">Todos os meses</option>
            </select>
          </div>
        </div>
      </div>

      <div id="totalFiltrado" class="card mb-6 hidden">
        <div class="card-content">
          <div class="stat-card">
            <div class="stat-value" id="totalValor">0.00€</div>
            <div class="stat-label">Total filtrado</div>
          </div>
        </div>
      </div>

      <div id="listaSaidas"></div>

      <div class="text-center mt-8">
        <button id="toggleMesesBtn" class="btn btn-secondary hidden">Ver mais...</button>
      </div>
    </main>
  </div>

  <script>
    let comprasOriginais = [];
    let mostrarTodos = false;

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("data").value = new Date().toISOString().slice(0, 10);
      carregarSaidas();
    });

    document.getElementById("formSaida").addEventListener("submit", async (e) => {
      e.preventDefault();
      const produto = document.getElementById("produto").value.trim();
      const fornecedor = document.getElementById("fornecedor").value.trim();
      const valor = parseFloat(document.getElementById("valor").value.trim());
      const data = document.getElementById("data").value;

      if (!produto || !fornecedor || isNaN(valor) || !data) {
        showNotification("Por favor preenche todos os campos.", "error");
        return;
      }

      const novaCompra = { produto, fornecedor, valor, data };

      const resposta = await fetch("/saidas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(novaCompra)
      });

      if (resposta.ok) {
        document.getElementById("formSaida").reset();
        document.getElementById("data").value = new Date().toISOString().slice(0, 10);
        showNotification("Compra registada com sucesso!", "success");
        carregarSaidas();
      } else {
        showNotification("Erro ao registar compra.", "error");
      }
    });

    document.getElementById("filtroProduto").addEventListener("input", filtrarCompras);
    document.getElementById("filtroMes").addEventListener("change", filtrarCompras);

    async function carregarSaidas() {
      const resposta = await fetch("/saidas");
      const compras = await resposta.json();
      comprasOriginais = compras;
      atualizarFiltroMes(compras);
      renderizarCompras(compras);
    }

    function atualizarFiltroMes(compras) {
      const select = document.getElementById("filtroMes");
      const meses = [...new Set(compras.map(c => c.data.slice(0, 7)))];
      const nomesMeses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                          "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];

      select.innerHTML = '<option value="">Todos os meses</option>';
      meses.sort().reverse().forEach(m => {
        const [ano, mes] = m.split("-");
        const nomeMes = nomesMeses[parseInt(mes, 10) - 1];
        select.innerHTML += `<option value="${m}">${nomeMes} de ${ano}</option>`;
      });
    }

    function filtrarCompras() {
      const produto = document.getElementById("filtroProduto").value.toLowerCase();
      const mes = document.getElementById("filtroMes").value;

      const filtradas = comprasOriginais.filter(c => {
        return (
          (!mes || c.data.startsWith(mes)) &&
          (!produto || c.produto.toLowerCase().includes(produto))
        );
      });

      const totalDiv = document.getElementById("totalFiltrado");
      if (produto) {
        const total = filtradas.reduce((soma, c) => soma + (parseFloat(c.valor) || 0), 0);
        totalDiv.classList.remove("hidden");
        document.getElementById("totalValor").textContent = `${total.toFixed(2)}€`;
      } else {
        totalDiv.classList.add("hidden");
      }

      mostrarTodos = !!produto || !!mes;
      renderizarCompras(filtradas);
    }

    function formatarMesAno(chave) {
      const [mes, ano] = chave.split("/");
      const mesesNomes = [
        "Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
        "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"
      ];
      return `${mesesNomes[parseInt(mes, 10) - 1]} de ${ano}`;
    }

    async function eliminarCompra(id) {
      if (!confirm("Eliminar esta compra?")) return;
      const resposta = await fetch(`/saidas/${id}`, { method: "DELETE" });
      if (resposta.ok) {
        showNotification("Compra eliminada com sucesso!", "success");
        carregarSaidas();
      } else {
        showNotification("Erro ao eliminar compra.", "error");
      }
    }

    function renderizarCompras(compras, filtroAtivo = false) {
      const grupoPorMes = {};
      compras.forEach((compra) => {
        const [ano, mes] = compra.data.split("-");
        const chave = `${String(mes).padStart(2, '0')}/${ano}`;
        if (!grupoPorMes[chave]) grupoPorMes[chave] = [];
        grupoPorMes[chave].push(compra);
      });

      const listaDiv = document.getElementById("listaSaidas");
      listaDiv.innerHTML = "";

      const mesesOrdenados = Object.keys(grupoPorMes).sort((a, b) => {
        const [ma, aa] = a.split("/").map(Number);
        const [mb, ab] = b.split("/").map(Number);
        return new Date(ab, mb - 1) - new Date(aa, ma - 1);
      });

      const hoje = new Date();
      const ultimos6Meses = [];
      for (let i = 0; i < 6; i++) {
        const data = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
        const chave = `${String(data.getMonth() + 1).padStart(2, '0')}/${data.getFullYear()}`;
        ultimos6Meses.push(chave);
      }

      const mesesRecentes = mesesOrdenados.filter(m => ultimos6Meses.includes(m));
      const mesesAntigos = mesesOrdenados.filter(m => !ultimos6Meses.includes(m));
      const mesesParaMostrar = mostrarTodos ? [...mesesRecentes, ...mesesAntigos] : mesesRecentes;

      mesesParaMostrar.forEach((mesAno, index) => {
        if (mostrarTodos && index === mesesRecentes.length && mesesAntigos.length > 0) {
          const divider = document.createElement("div");
          divider.className = "text-center text-2xl font-bold text-secondary mb-6 mt-8";
          divider.textContent = "Mais antigas";
          listaDiv.appendChild(divider);
        }

        const card = document.createElement("div");
        card.className = "card month-section mb-4";

        const header = document.createElement("div");
        header.className = "month-header";
        header.innerHTML = `
          <div class="month-title">
            <span>${formatarMesAno(mesAno)}</span>
          </div>
        `;

        const content = document.createElement("div");
        content.className = "month-content open";

        const list = document.createElement("ul");
        list.className = "list";

        let totalMes = 0;
        grupoPorMes[mesAno].sort((a, b) => a.data.localeCompare(b.data)).forEach((compra) => {
          const item = document.createElement("li");
          item.className = "list-item";

          const itemContent = document.createElement("div");
          itemContent.className = "list-item-content";

          const itemTitle = document.createElement("div");
          itemTitle.className = "list-item-title";
          itemTitle.textContent = `${compra.produto} - ${compra.fornecedor}`;

          const itemSubtitle = document.createElement("div");
          itemSubtitle.className = "list-item-subtitle";
          itemSubtitle.textContent = compra.data;

          itemContent.appendChild(itemTitle);
          itemContent.appendChild(itemSubtitle);

          const itemActions = document.createElement("div");
          itemActions.className = "list-item-actions";

          const valor = document.createElement("span");
          valor.className = "font-semibold text-lg";
          valor.textContent = `${compra.valor.toFixed(2)}€`;

          const btnDelete = document.createElement("button");
          btnDelete.className = "btn btn-error btn-sm btn-icon";
          btnDelete.innerHTML = "🗑️";
          btnDelete.onclick = () => eliminarCompra(compra.id);

          itemActions.appendChild(valor);
          itemActions.appendChild(btnDelete);

          item.appendChild(itemContent);
          item.appendChild(itemActions);
          list.appendChild(item);
          totalMes += compra.valor;
        });

        // Add total
        const totalItem = document.createElement("li");
        totalItem.className = "list-item";
        totalItem.style.borderTop = "2px solid var(--secondary-200)";
        totalItem.style.fontWeight = "600";

        const totalContent = document.createElement("div");
        totalContent.className = "list-item-content";
        totalContent.innerHTML = `<div class="list-item-title">Total do mês</div>`;

        const totalValue = document.createElement("div");
        totalValue.className = "font-bold text-xl text-primary";
        totalValue.textContent = `${totalMes.toFixed(2)}€`;

        totalItem.appendChild(totalContent);
        totalItem.appendChild(totalValue);
        list.appendChild(totalItem);

        content.appendChild(list);
        card.appendChild(header);
        card.appendChild(content);
        listaDiv.appendChild(card);
      });

      // Toggle button
      const btnAntigo = document.getElementById("toggleMesesBtn");
      if (btnAntigo) {
        btnAntigo.classList.add("hidden");
        if (!filtroAtivo && mesesAntigos.length > 0) {
          btnAntigo.classList.remove("hidden");
          btnAntigo.textContent = mostrarTodos ? "Ver menos..." : "Ver mais...";
          btnAntigo.onclick = () => {
            mostrarTodos = !mostrarTodos;
            renderizarCompras(compras, false);
          };
        }
      }
    }

    function showNotification(message, type = "success") {
      const notification = document.createElement("div");
      notification.className = `notification ${type === "success" ? "notification-success" : "notification-error"}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }
  </script>
</body>
</html>
