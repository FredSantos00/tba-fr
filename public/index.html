<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestão TBA-FR - Login</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Digite o código</h1>
      
      <div id="errorNotification" class="error-notification hidden">
        Código incorreto. Tenta outra vez.
      </div>

      <div class="pin-dots">
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
        <div class="pin-dot" id="dot3"></div>
        <div class="pin-dot" id="dot4"></div>
      </div>

      <div class="keypad">
        <button class="keypad-btn" onclick="addDigit('1')">1</button>
        <button class="keypad-btn" onclick="addDigit('2')">2</button>
        <button class="keypad-btn" onclick="addDigit('3')">3</button>
        <button class="keypad-btn" onclick="addDigit('4')">4</button>
        <button class="keypad-btn" onclick="addDigit('5')">5</button>
        <button class="keypad-btn" onclick="addDigit('6')">6</button>
        <button class="keypad-btn" onclick="addDigit('7')">7</button>
        <button class="keypad-btn" onclick="addDigit('8')">8</button>
        <button class="keypad-btn" onclick="addDigit('9')">9</button>
        <button class="keypad-btn" onclick="clearAll()">←</button>
        <button class="keypad-btn" onclick="addDigit('0')">0</button>
        <button class="keypad-btn" onclick="removeLast()">⌫</button>
      </div>

      <div class="login-footer">
        <span>Cancelar</span>
        <span>Emergência</span>
      </div>
    </div>
  </div>

  <form id="codeForm" method="POST" action="/verificar-codigo">
    <input type="hidden" name="codigo" id="codigoInput" />
  </form>

  <script>
    let code = "";
    const input = document.getElementById("codigoInput");

    function updateDots() {
      for (let i = 1; i <= 4; i++) {
        document.getElementById("dot" + i).classList.toggle("filled", i <= code.length);
      }
    }

    function addDigit(d) {
      if (code.length < 4) {
        code += d;
        input.value = code;
        updateDots();
        if (code.length === 4) {
          setTimeout(() => {
            document.getElementById("codeForm").submit();
          }, 200);
        }
      }
    }

    function clearAll() {
      code = "";
      input.value = "";
      updateDots();
    }

    function removeLast() {
      code = code.slice(0, -1);
      input.value = code;
      updateDots();
    }

    // Show error notification if needed
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('erro') === '1') {
        const notification = document.getElementById("errorNotification");
        notification.classList.remove("hidden");
        setTimeout(() => {
          notification.classList.add("hidden");
          const url = new URL(window.location);
          url.searchParams.delete('erro');
          window.history.replaceState({}, document.title, url.pathname);
        }, 3000);
      }
    });
  </script>
</body>
</html>
