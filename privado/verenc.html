<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Listagem de Encomendas - Gestão TBA-FR</title>
  <link rel="stylesheet" href="../public/styles/main.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <a href="home.html" class="logo">
          <div class="logo-icon">🏠</div>
          <span>Gestão TBA-FR</span>
        </a>
        <nav class="nav-menu">
          <a href="home.html" class="nav-link">
            <span>🏠</span>
            <span>Home</span>
          </a>
          <a href="encomendas.html" class="nav-link">
            <span>➕</span>
            <span>Nova</span>
          </a>
          <a href="verenc.html" class="nav-link active">
            <span>📝</span>
            <span>Listagem</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div class="section-header">
        <h1 class="section-title">
          📝 Listagem de Encomendas
        </h1>
        <div class="section-actions">
          <a href="encomendas.html" class="btn btn-primary">
            ➕ Nova Encomenda
          </a>
        </div>
      </div>

      <div class="card mb-6">
        <div class="card-content">
          <div class="filter-bar">
            <input
              type="text"
              id="filtroNome"
              class="form-input"
              placeholder="Filtrar por nome"
              oninput="carregarEncomendas()"
            />
            <select id="filtroMes" class="form-select" onchange="carregarEncomendas()">
              <option value="">Todos os meses</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card mb-6">
        <div class="card-header">
          <h2 class="card-title">📌 Encomendas Ativas</h2>
        </div>
        <div class="card-content">
          <ul id="listaAtivas" class="list"></ul>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">✅ Encomendas Finalizadas</h2>
        </div>
        <div class="card-content">
          <ul id="listaFinalizadas" class="list"></ul>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal for finalizing order -->
  <div id="modalFinalizar" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Finalizar Encomenda</h3>
      </div>
      <div class="modal-content">
        <div class="form-group">
          <label class="form-label" for="inputValorFinalizar">Valor angariado (€)</label>
          <input
            id="inputValorFinalizar"
            type="number"
            min="0"
            step="0.01"
            class="form-input"
            placeholder="0.00"
          />
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnCancelarModal" class="btn btn-secondary">Cancelar</button>
        <button id="btnOkModal" class="btn btn-success">Finalizar</button>
      </div>
    </div>
  </div>

  <!-- Modal for deleting order -->
  <div id="modalApagar" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Confirmar Eliminação</h3>
      </div>
      <div class="modal-content">
        <p>Tem a certeza que quer eliminar esta encomenda?</p>
      </div>
      <div class="modal-footer">
        <button id="btnCancelarApagar" class="btn btn-secondary">Cancelar</button>
        <button id="btnOkApagar" class="btn btn-error">Eliminar</button>
      </div>
    </div>
  </div>

  <script>
    let encomendaParaFinalizar = null;
    let encomendaParaApagar = null;

    function normalizar(str) {
      return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function formatarMesAno(data) {
      const [ano, mes] = data.split('-');
      const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho",
                     "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
      return `${meses[parseInt(mes)-1]} de ${ano}`;
    }

    async function carregarEncomendas() {
      try {
        const resp = await fetch('/api/encomendas');
        if (!resp.ok) throw new Error('Erro a obter dados');
        const encomendas = await resp.json();

        const filtroNome = normalizar(document.getElementById("filtroNome").value);
        const filtroMes = document.getElementById("filtroMes").value;

        const listaAtivas = document.getElementById('listaAtivas');
        const listaFinalizadas = document.getElementById('listaFinalizadas');

        listaAtivas.innerHTML = '';
        listaFinalizadas.innerHTML = '';

        const gruposAtivas = {};
        const finalizadas = [];
        const mesesUnicos = new Set();

        encomendas.forEach(e => {
          if (filtroNome && !normalizar(e.nome).includes(filtroNome)) return;

          const mes = (e.data || '').slice(0, 7);
          if (filtroMes && mes !== filtroMes) return;
          mesesUnicos.add(mes);

          if (e.finalizada) {
            finalizadas.push(e);
          } else {
            if (!gruposAtivas[mes]) gruposAtivas[mes] = [];
            gruposAtivas[mes].push(e);
          }
        });

        // Update month filter
        const filtroMesSelect = document.getElementById("filtroMes");
        filtroMesSelect.innerHTML = '<option value="">Todos os meses</option>';
        Array.from(mesesUnicos)
          .sort((a, b) => b.localeCompare(a))
          .forEach(mes => {
            const opt = document.createElement("option");
            opt.value = mes;
            opt.textContent = formatarMesAno(mes);
            filtroMesSelect.appendChild(opt);
          });

        // Render active orders
        Object.keys(gruposAtivas)
          .sort((a, b) => b.localeCompare(a))
          .forEach(mes => {
            gruposAtivas[mes]
              .sort((a, b) => (a.data || '').localeCompare(b.data || ''))
              .forEach(e => {
                const li = criarItemEncomenda(e, false);
                listaAtivas.appendChild(li);
              });
          });

        // Render finalized orders
        finalizadas
          .sort((a, b) => (b.id || 0) - (a.id || 0))
          .forEach(e => {
            const li = criarItemEncomenda(e, true);
            listaFinalizadas.appendChild(li);
          });

      } catch (error) {
        showNotification('Erro ao carregar encomendas: ' + error.message, 'error');
      }
    }

    function criarItemEncomenda(e, finalizada) {
      const li = document.createElement('li');
      li.className = 'list-item';

      const content = document.createElement('div');
      content.className = 'list-item-content';

      const title = document.createElement('div');
      title.className = 'list-item-title';
      title.innerHTML = `<span class="badge badge-primary">${e.numero}</span> ${e.nome}`;

      const subtitle = document.createElement('div');
      subtitle.className = 'list-item-subtitle';
      subtitle.textContent = `${e.quantidade} de ${e.produto} • ${e.data}`;

      content.appendChild(title);
      content.appendChild(subtitle);

      if (e.telemovel) {
        const phone = document.createElement('div');
        phone.className = 'list-item-subtitle mt-2';
        phone.innerHTML = `📞 <a href="tel:${e.telemovel}" class="text-primary">${e.telemovel}</a>`;
        content.appendChild(phone);
      }

      if (finalizada && e.dataFinalizacao && e.valorAngariado !== undefined) {
        const finalInfo = document.createElement('div');
        finalInfo.className = 'list-item-subtitle mt-2';
        const data = e.dataFinalizacao.slice(0, 10);
        const hora = e.dataFinalizacao.slice(11, 16);
        finalInfo.innerHTML = `<span class="badge badge-success">Finalizada ${data} ${hora}</span> • <strong>${Number(e.valorAngariado).toFixed(2)}€</strong>`;
        content.appendChild(finalInfo);
      }

      const actions = document.createElement('div');
      actions.className = 'list-item-actions';

      if (finalizada) {
        const btnApagar = document.createElement('button');
        btnApagar.className = 'btn btn-error btn-sm btn-icon';
        btnApagar.innerHTML = '🗑️';
        btnApagar.title = 'Eliminar';
        btnApagar.onclick = () => mostrarModalApagar(e.numero);
        actions.appendChild(btnApagar);
      } else {
        const btnFinalizar = document.createElement('button');
        btnFinalizar.className = 'btn btn-success btn-sm btn-icon';
        btnFinalizar.innerHTML = '✅';
        btnFinalizar.title = 'Finalizar';
        btnFinalizar.onclick = () => mostrarModalFinalizar(e.numero);
        actions.appendChild(btnFinalizar);

        const btnApagar = document.createElement('button');
        btnApagar.className = 'btn btn-error btn-sm btn-icon';
        btnApagar.innerHTML = '🗑️';
        btnApagar.title = 'Eliminar';
        btnApagar.onclick = () => mostrarModalApagar(e.numero);
        actions.appendChild(btnApagar);
      }

      li.appendChild(content);
      li.appendChild(actions);
      return li;
    }

    // Modal functions
    function mostrarModalFinalizar(numero) {
      encomendaParaFinalizar = numero;
      document.getElementById('inputValorFinalizar').value = '';
      document.getElementById('modalFinalizar').classList.remove('hidden');
      document.getElementById('inputValorFinalizar').focus();
    }

    function esconderModalFinalizar() {
      encomendaParaFinalizar = null;
      document.getElementById('modalFinalizar').classList.add('hidden');
    }

    function mostrarModalApagar(numero) {
      encomendaParaApagar = numero;
      document.getElementById('modalApagar').classList.remove('hidden');
    }

    function esconderModalApagar() {
      encomendaParaApagar = null;
      document.getElementById('modalApagar').classList.add('hidden');
    }

    // Event listeners
    document.getElementById('btnCancelarModal').onclick = esconderModalFinalizar;
    document.getElementById('btnCancelarApagar').onclick = esconderModalApagar;

    document.getElementById('btnOkModal').onclick = async () => {
      const valorStr = document.getElementById('inputValorFinalizar').value.trim();
      const valor = parseFloat(valorStr.replace(',', '.'));
      if (isNaN(valor) || valor < 0) {
        showNotification('Por favor, introduz um valor válido.', 'error');
        return;
      }

      const datafinalizacao = new Date().toISOString().slice(0, 19).replace('T', ' ');

      try {
        const resp = await fetch(`/finalizar-encomenda/${encodeURIComponent(encomendaParaFinalizar)}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            valorAngariado: valor,
            dataFinalizacao: datafinalizacao
          })
        });
        if (!resp.ok) throw new Error('Erro ao finalizar encomenda');
        esconderModalFinalizar();
        showNotification('Encomenda finalizada com sucesso!', 'success');
        await carregarEncomendas();
      } catch (e) {
        showNotification('Erro: ' + e.message, 'error');
      }
    };

    document.getElementById('btnOkApagar').onclick = async () => {
      try {
        const resp = await fetch('/apagar-encomenda', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ numero: encomendaParaApagar })
        });
        if (!resp.ok) throw new Error(await resp.text());
        esconderModalApagar();
        showNotification('Encomenda eliminada com sucesso!', 'success');
        await carregarEncomendas();
      } catch (e) {
        showNotification('Erro: ' + e.message, 'error');
      }
    };

    function showNotification(message, type = "success") {
      const notification = document.createElement("div");
      notification.className = `notification ${type === "success" ? "notification-success" : "notification-error"}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }

    // Load orders on page load
    window.onload = carregarEncomendas;
  </script>
</body>
</html>
