<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendas - Gestão TBA-FR</title>
  <link rel="stylesheet" href="../public/styles/main.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <a href="home.html" class="logo">
          <div class="logo-icon">🏠</div>
          <span>Gestão TBA-FR</span>
        </a>
        <nav class="nav-menu">
          <a href="home.html" class="nav-link">
            <span>🏠</span>
            <span>Home</span>
          </a>
          <a href="entradas.html" class="nav-link active">
            <span>💰</span>
            <span>Vendas</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div class="section-header">
        <h1 class="section-title">
          💰 Gestão de Vendas
        </h1>
      </div>

      <div class="card mb-6">
        <div class="card-header">
          <h2 class="card-title">Nova Venda</h2>
          <p class="card-subtitle">Registar uma nova entrada de vendas</p>
        </div>
        <div class="card-content">
          <form id="entradaForm">
            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label" for="descricao">Descrição</label>
                <input type="text" id="descricao" class="form-input" placeholder="Descrição da venda" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="data">Data</label>
                <input type="date" id="data" class="form-input" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="valor">Valor (€)</label>
              <input type="number" step="0.01" id="valor" class="form-input" placeholder="0.00" required />
            </div>
            <button type="submit" class="btn btn-success btn-lg" style="width: 100%;">
              Registar Venda
            </button>
          </form>
        </div>
      </div>

      <div id="listaEntradas"></div>
    </main>
  </div>

  <!-- Edit Modal -->
  <div id="modalEditar" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Editar Entrada</h3>
      </div>
      <div class="modal-content">
        <div class="form-group">
          <label class="form-label" for="editDescricao">Descrição</label>
          <input type="text" id="editDescricao" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editData">Data</label>
          <input type="date" id="editData" class="form-input" />
        </div>
        <div class="form-group">
          <label class="form-label" for="editValor">Valor (€)</label>
          <input type="number" step="0.01" id="editValor" class="form-input" />
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnCancelarEdit" class="btn btn-secondary">Cancelar</button>
        <button id="btnSalvarEdit" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('data').valueAsDate = new Date();
    let mesesAbertos = new Set();
    let entradaParaEditar = null;

    async function carregarEntradas() {
      const res = await fetch('/entradas');
      const dados = await res.json();
      const container = document.getElementById('listaEntradas');
      container.innerHTML = '';

      const meses = Object.keys(dados).sort((a, b) => {
        const aNum = parseInt(a.replace('/', ''), 10);
        const bNum = parseInt(b.replace('/', ''), 10);
        return bNum - aNum;
      });

      if (mesesAbertos.size === 0 && meses.length > 0) {
        mesesAbertos.add(meses[0]);
      }

      meses.forEach(mes => {
        const card = document.createElement('div');
        card.className = 'card month-section mb-4';

        const header = document.createElement('div');
        header.className = 'month-header';
        if (mesesAbertos.has(mes)) header.classList.add('open');

        const title = document.createElement('div');
        title.className = 'month-title';
        title.innerHTML = `
          <span class="month-toggle ${mesesAbertos.has(mes) ? 'open' : ''}">▶</span>
          <span>${mes}</span>
        `;

        const total = document.createElement('div');
        total.className = 'month-total';
        total.textContent = `${dados[mes].total.toFixed(2)}€`;

        header.appendChild(title);
        header.appendChild(total);

        const content = document.createElement('div');
        content.className = `month-content ${mesesAbertos.has(mes) ? 'open' : ''}`;

        const list = document.createElement('ul');
        list.className = 'list';

        dados[mes].entradas.forEach(e => {
          const item = document.createElement('li');
          item.className = 'list-item';

          const itemContent = document.createElement('div');
          itemContent.className = 'list-item-content';

          const itemTitle = document.createElement('div');
          itemTitle.className = 'list-item-title';
          itemTitle.textContent = e.descricao;

          const itemSubtitle = document.createElement('div');
          itemSubtitle.className = 'list-item-subtitle';
          itemSubtitle.textContent = e.data;

          itemContent.appendChild(itemTitle);
          itemContent.appendChild(itemSubtitle);

          const itemActions = document.createElement('div');
          itemActions.className = 'list-item-actions';

          const valor = document.createElement('span');
          valor.className = 'font-semibold text-lg';
          valor.textContent = `${e.valor.toFixed(2)}€`;

          const btnEdit = document.createElement('button');
          btnEdit.className = 'btn btn-secondary btn-sm btn-icon';
          btnEdit.innerHTML = '✏️';
          btnEdit.title = 'Editar';
          btnEdit.onclick = () => editarEntrada(e);

          const btnDelete = document.createElement('button');
          btnDelete.className = 'btn btn-error btn-sm btn-icon';
          btnDelete.innerHTML = '🗑️';
          btnDelete.title = 'Eliminar';
          btnDelete.onclick = () => eliminarEntrada(e.id);

          itemActions.appendChild(valor);
          itemActions.appendChild(btnEdit);
          itemActions.appendChild(btnDelete);

          item.appendChild(itemContent);
          item.appendChild(itemActions);
          list.appendChild(item);
        });

        content.appendChild(list);

        header.addEventListener('click', () => {
          const isOpen = content.classList.contains('open');
          if (isOpen) {
            content.classList.remove('open');
            title.querySelector('.month-toggle').classList.remove('open');
            mesesAbertos.delete(mes);
          } else {
            content.classList.add('open');
            title.querySelector('.month-toggle').classList.add('open');
            mesesAbertos.add(mes);
          }
        });

        card.appendChild(header);
        card.appendChild(content);
        container.appendChild(card);
      });
    }

    function editarEntrada(entrada) {
      entradaParaEditar = entrada;
      document.getElementById('editDescricao').value = entrada.descricao;
      document.getElementById('editData').value = entrada.data;
      document.getElementById('editValor').value = entrada.valor.toFixed(2);
      document.getElementById('modalEditar').classList.remove('hidden');
    }

    async function eliminarEntrada(id) {
      if (confirm('Tem a certeza que quer eliminar esta entrada?')) {
        await fetch(`/entradas/${id}`, { method: 'DELETE' });
        showNotification('Entrada eliminada com sucesso!', 'success');
        carregarEntradas();
      }
    }

    // Form submission
    document.getElementById('entradaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const descricao = document.getElementById('descricao').value.trim();
      const data = document.getElementById('data').value;
      const valor = parseFloat(document.getElementById('valor').value);

      if (!descricao || !data || isNaN(valor)) return;

      await fetch('/entradas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descricao, data, valor })
      });

      showNotification('Venda registada com sucesso!', 'success');
      e.target.reset();
      document.getElementById('data').valueAsDate = new Date();
      carregarEntradas();
    });

    // Modal event listeners
    document.getElementById('btnCancelarEdit').onclick = () => {
      document.getElementById('modalEditar').classList.add('hidden');
      entradaParaEditar = null;
    };

    document.getElementById('btnSalvarEdit').onclick = async () => {
      const descricao = document.getElementById('editDescricao').value.trim();
      const data = document.getElementById('editData').value;
      const valor = parseFloat(document.getElementById('editValor').value);

      if (!descricao || !data || isNaN(valor)) {
        showNotification('Por favor, preencha todos os campos corretamente.', 'error');
        return;
      }

      await fetch(`/entradas/${entradaParaEditar.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ descricao, data, valor })
      });

      document.getElementById('modalEditar').classList.add('hidden');
      entradaParaEditar = null;
      showNotification('Entrada atualizada com sucesso!', 'success');
      carregarEntradas();
    };

    function showNotification(message, type = "success") {
      const notification = document.createElement("div");
      notification.className = `notification ${type === "success" ? "notification-success" : "notification-error"}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }

    carregarEntradas();
  </script>
</body>
</html>
