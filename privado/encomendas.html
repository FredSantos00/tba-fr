<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova Encomenda - Gestão TBA-FR</title>
  <link rel="stylesheet" href="../public/styles/main.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="header-content">
        <a href="home.html" class="logo">
          <div class="logo-icon">🏠</div>
          <span>Gestão TBA-FR</span>
        </a>
        <nav class="nav-menu">
          <a href="home.html" class="nav-link">
            <span>🏠</span>
            <span>Home</span>
          </a>
          <a href="encomendas.html" class="nav-link active">
            <span>➕</span>
            <span>Nova</span>
          </a>
          <a href="verenc.html" class="nav-link">
            <span>📝</span>
            <span>Listagem</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="main-content">
      <div class="card">
        <div class="card-header">
          <h1 class="card-title">Nova Encomenda</h1>
          <p class="card-subtitle">Adicionar uma nova encomenda ao sistema</p>
        </div>
        <div class="card-content">
          <form id="encomendaForm">
            <div class="form-group">
              <label class="form-label" for="nome">Nome do Cliente</label>
              <input
                type="text"
                id="nome"
                name="nome"
                class="form-input"
                placeholder="Ex: Frederico Santos"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="telemovel">Telemóvel (opcional)</label>
              <input
                type="tel"
                id="telemovel"
                name="telemovel"
                class="form-input"
                placeholder="Ex: 912345678"
                inputmode="numeric"
                pattern="[0-9]*"
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="produto">Produto</label>
              <input
                type="text"
                id="produto"
                name="produto"
                class="form-input"
                placeholder="Ex: Vinho branco"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="quantidade">Quantidade</label>
              <input
                type="text"
                id="quantidade"
                name="quantidade"
                class="form-input"
                placeholder="Ex: 3 garrafões"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="data">Data</label>
              <input
                type="date"
                id="data"
                name="data"
                class="form-input"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
              Adicionar Encomenda
            </button>
          </form>
        </div>
      </div>

      <div class="text-center mt-8">
        <a href="verenc.html" class="btn btn-secondary btn-lg">
          📝 Ver Listagem
        </a>
      </div>
    </main>
  </div>

  <script>
    // Set today's date as default
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("data").value = today;

    const form = document.getElementById("encomendaForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const formData = new FormData(form);
      const dados = {
        nome: formData.get('nome'),
        telemovel: formData.get('telemovel'),
        produto: formData.get('produto'),
        quantidade: formData.get('quantidade'),
        data: formData.get('data')
      };

      try {
        const response = await fetch("/adicionar-encomenda", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(dados)
        });

        if (response.ok) {
          showNotification("Encomenda adicionada com sucesso ✅", "success");
          form.reset();
          document.getElementById("data").value = today;
        } else {
          showNotification("Erro ao adicionar encomenda ❌", "error");
        }
      } catch (error) {
        console.error(error);
        showNotification("Erro de ligação ao servidor ⚠️", "error");
      }
    });

    function showNotification(message, type = "success") {
      const notification = document.createElement("div");
      notification.className = `notification ${type === "success" ? "notification-success" : "notification-error"}`;
      notification.textContent = message;
      document.body.appendChild(notification);
      
      setTimeout(() => {
        notification.remove();
      }, 3000);
    }
  </script>
</body>
</html>
